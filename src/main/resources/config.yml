# ============================================================
# HaoHan Metallurgy — config.yml
# Mọi giá trị gameplay đều ở đây. Không hardcode trong code.
# ============================================================

# ── Debug ────────────────────────────────────────────────────
debug: false

# ── Tick Engine ───────────────────────────────────────────────
# Máy chạy mỗi bao nhiêu ticks (20 ticks = 1 giây)
tick-rate: 20

# ── Máy (Machine) ────────────────────────────────────────────
machines:
  # Khoảng cách tối đa để player mở GUI máy (blocks)
  interaction-range: 5

# ── GUI ───────────────────────────────────────────────────────
gui:
  # Tên hiển thị của inventory GUI (hỗ trợ & color codes)
  forge-title: "&8⚒ &6Ancient Forge"
  forge-custom:
    enabled: true
    prefix: "\uE100"
    glyph: "\uE101"
    font: "haohansmp:gui"
  # Slot layout: xem GuiManager để hiểu ý nghĩa từng slot
  fuel-slot: 3
  input-slot-1: 11
  input-slot-2: 12
  output-slot: 15
  progress-slot: 13
  temperature-slot: 4

# ── Fuel values (ticks mỗi đơn vị nhiên liệu) ─────────────────
# Format: MATERIAL_NAME: ticks
fuel-values:
  COAL: 800
  CHARCOAL: 800
  COAL_BLOCK: 7200
  BLAZE_ROD: 2400
  LAVA_BUCKET: 20000
  DRIED_KELP_BLOCK: 4000

temperature:
  # Nhiệt độ tăng bao nhiêu mỗi tick khi có fuel (8 = ~160°C/giây → đạt 800°C trong ~5 giây)
  rise-per-tick: 8
  # Nhiệt độ giảm bao nhiêu mỗi tick khi hết fuel
  fall-per-tick: 1
  # Nhiệt độ tối đa (°C)
  max: 2000

  # Cấp độ giới hạn nhiệt độ tối đa theo loại nhiên liệu sử dụng
  fuel-limits:
    "DRIED_KELP_BLOCK": 900
    "CHARCOAL": 1050
    "COAL": 1200
    "COAL_BLOCK": 1400
    "LAVA_BUCKET": 1600
    "BLAZE_ROD": 1800

  # Các chất làm mát chủ động và nhiệt độ hạ đi tương ứng
  coolants:
    "SNOWBALL": 50
    "ICE": 150
    "PACKED_ICE": 200
    "BLUE_ICE": 300
    "WATER_BUCKET": 400

# ── Progression ───────────────────────────────────────────────
progression:
  # Các block đại diện cho quặng luyện kim trong thế giới
  ores:
    # Mặc định dùng COPPER_ORE làm Ember Ore
    ember-ore: "COPPER_ORE"
    # Mặc định dùng LAPIS_ORE làm Soul Ore
    soul-ore: "LAPIS_ORE"
    # Mặc định dùng EMERALD_ORE làm Mithril Ore (quặng mới)
    mithril-ore: "EMERALD_ORE"
  
  # Cấp độ công cụ tối thiểu để đào quặng thành công (không bị mất drop):
  # 1: Wooden Pickaxe
  # 2: Stone Pickaxe / Gold Pickaxe
  # 3: Copper Slag Pickaxe
  # 4: Copper Pickaxe
  # 5: Iron Slag Pickaxe
  # 6: Iron Pickaxe
  # 7: Diamond Pickaxe
  # 8: Mithril Pickaxe (New Ore Pickaxe)
  # 9: Netherite Pickaxe
  mining-requirements:
    "minecraft:stone": 1
    "minecraft:coal_ore": 1
    "minecraft:deepslate_coal_ore": 1
    "minecraft:copper_ore": 2
    "minecraft:deepslate_copper_ore": 2
    "minecraft:raw_copper_block": 2
    "minecraft:iron_ore": 4
    "minecraft:deepslate_iron_ore": 4
    "minecraft:raw_iron_block": 4
    "minecraft:diamond_ore": 6
    "minecraft:deepslate_diamond_ore": 6
    "mithril-ore": 7
    "minecraft:ancient_debris": 8
  # Tier cua tool vanilla. Plugin dung bang nay de kiem tra progression dao quang.
  vanilla-tool-tiers:
    WOODEN_PICKAXE: 1
    STONE_PICKAXE: 2
    GOLDEN_PICKAXE: 2
    COPPER_PICKAXE: 4
    IRON_PICKAXE: 6
    DIAMOND_PICKAXE: 7
    NETHERITE_PICKAXE: 9

  # Thong so cho item plugin. Item van co the dung texture/model vanilla,
  # nhung tier, durability va attribute duoc gan khi plugin tao item.
  custom-item-stats:
    copper_slag_pickaxe:
      tier: 3
      max-damage: 95
      attack-damage: 2.0
      attack-speed: -2.8
      mining-efficiency: 1.5
      block-break-speed: 0.0
    copper_pickaxe:
      tier: 4
      max-damage: 165
      attack-damage: 2.0
      attack-speed: -2.8
      mining-efficiency: 2.5
      block-break-speed: 0.0
    iron_slag_pickaxe:
      tier: 5
      max-damage: 190
      attack-damage: 3.0
      attack-speed: -2.8
      mining-efficiency: 3.5
      block-break-speed: 0.0
    gold_slag_pickaxe:
      tier: 1
      max-damage: 24
      attack-damage: 1.0
      attack-speed: -2.8
      mining-efficiency: 8.0
      block-break-speed: 0.0
    embersteel_slag_pickaxe:
      tier: 3
      max-damage: 120
      attack-damage: 2.0
      attack-speed: -2.8
      mining-efficiency: 2.0
      block-break-speed: 0.0
    embersteel_pickaxe:
      tier: 4
      max-damage: 210
      attack-damage: 3.0
      attack-speed: -2.8
      mining-efficiency: 3.0
      block-break-speed: 0.0
    soulsteel_slag_pickaxe:
      tier: 7
      max-damage: 850
      attack-damage: 3.0
      attack-speed: -2.8
      mining-efficiency: 5.0
      block-break-speed: 0.0
    soulsteel_pickaxe:
      tier: 8
      max-damage: 1420
      attack-damage: 4.0
      attack-speed: -2.8
      mining-efficiency: 6.0
      block-break-speed: 0.0
    netherite_slag_pickaxe:
      tier: 8
      max-damage: 1200
      attack-damage: 3.0
      attack-speed: -2.8
      mining-efficiency: 7.0
      block-break-speed: 0.0
    mithril_pickaxe:
      tier: 8
      max-damage: 1800
      attack-damage: 4.0
      attack-speed: -2.8
      mining-efficiency: 7.0
      block-break-speed: 0.0
    mithril_slag_pickaxe:
      tier: 7
      max-damage: 900
      attack-damage: 3.0
      attack-speed: -2.8
      mining-efficiency: 5.5
      block-break-speed: 0.0

# ── Fail rate (Phase 5 — để trống ở Phase 1) ─────────────────
fail:
  enabled: true
  base-chance: 0.1   # 10% fail mặc định


# ── Mô hình 3D lò rèn (Phase 5.5) ──────────────────────────────
forge-model:
  enabled: true
  material: "PAPER"
  # Minecraft 1.21.4+: dùng item_model component để trỏ thẳng tới
  # HaoHanMetallurgy_Resourcepack/assets/minecraft/items/metallurgy.json
  item-model: "haohansmp:metallurgy"
  # Fallback/debug cho resource pack kiểu cũ.
  custom-model-data: 10001
  # Bạn có thể tăng giảm scale ở đây nếu model hiển thị quá to/nhỏ trong game
  scale:
    x: 3.0
    y: 4.0
    z: 3.0
  # Điều chỉnh vị trí tương đối của mô hình 3D để nó khớp chính xác với tâm của lò rèn
  offset:
    x: 0.5
    y: 0.0    # Nâng display lên 0.5 block so với bản trước
    z: 0.5

